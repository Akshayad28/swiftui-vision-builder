
aggregation_validation:
  name: "Level 4 Aggregation Validation"
  version: "1.0"
  monitor_id: 1
  aggregation_level: 4

  description: >
    This validation ensures that aggregated records in lhone_aggr_pos
    are correctly derived from transactional data in lhone_stage_pos_copy
    using business rules defined for Level 4 aggregation.

  tables:
    aggregated_table: lhone_aggr_pos
    stage_table: lhone_stage_pos_copy
    product_map_table: lhone_product_map
    report_category_table: lhone_monitor_rpt_cat

  key_definition:
    description: "Unique grouping key for Level 4 aggregation"
    fields:
      - LEI
      - PARENT_ENTITY
      - REPORT_CATEGORY
      - REPORT_SUB_CATEGORY

  filters:
    aggregated_table_filter:
      monitor_id: 1
      aggregation_level: 4

  column_mappings:
    LEI:
      source:
        table: lhone_aggr_pos
        column_key: SECURITY_IDENTIFIER_KEY
        column_value: SECURITY_IDENTIFIER_VALUE
        condition: "SECURITY_IDENTIFIER_KEY = 'LEI'"
      target:
        table: lhone_stage_pos_copy
        column: LEI

    PARENT_ENTITY:
      source:
        table: lhone_aggr_pos
        column: PARENT_ENTITY
      target:
        table: lhone_stage_pos_copy
        column: SDS_ENTITY_FIRST_L

  validation_rules:

    - rule_id: "R1_LEI_EXISTENCE"
      description: >
        Validate that LEI present in aggregated table exists in stage table.
      logic:
        query: >
          SELECT * FROM lhone_stage_pos_copy WHERE LEI = :LEI
      expected: "At least one record should exist"
      severity: "HIGH"

    - rule_id: "R2_PARENT_ENTITY_MATCH"
      description: >
        Validate that PARENT_ENTITY matches SDS_ENTITY_FIRST_L in stage table.
      logic:
        condition: "aggr.PARENT_ENTITY == stage.SDS_ENTITY_FIRST_L"
      severity: "HIGH"

    - rule_id: "R3_REPORT_CATEGORY"
      description: >
        Derive REPORT_CATEGORY based on business logic.

      logic:
        if:
          condition: "aggr.REPORT_CATEGORY == 'Non-Exempt'"
          action: "Use as-is"

        else:
          steps:
            - step: "Fetch HOLDING_CLASSIFICATION from stage"
              query: >
                SELECT DISTINCT HOLDING_CLASSIFICATION
                FROM lhone_stage_pos_copy
                WHERE LEI = :LEI

            - step: "Validate against report category table"
              query: >
                SELECT * FROM lhone_monitor_rpt_cat
                WHERE REPORT_CATEGORY = :HOLDING_CLASSIFICATION

      expected: "Derived value must match aggregated table value"
      severity: "HIGH"

    - rule_id: "R4_REPORT_SUB_CATEGORY"
      description: >
        Derive REPORT_SUB_CATEGORY using product mapping.

      grouping:
        fields:
          - LEI
          - SDS_ENTITY_FIRST_L
          - PRODUCT_TYPE
          - PRODUCT_SUB_TYPE
          - SETTLEMENT_TYPE

      steps:
        - step: "Fetch grouped records from stage"

        - step: "Determine LONG/SHORT behavior"
          logic:
            LONG: "Addition"
            SHORT: "Subtraction"

        - step: "Query product map"
          query: >
            SELECT UK_LONG_CLASSIFICATION
            FROM lhone_product_map
            WHERE PRODUCT_TYPE = :PRODUCT_TYPE
              AND PRODUCT_SUB_TYPE = :PRODUCT_SUB_TYPE
              AND SETTLEMENT_TYPE = :SETTLEMENT_TYPE
              AND UK_LONG_SCOPE = 'Y'

        - step: "Derive REPORT_SUB_CATEGORY"
          mapping:
            UK_LONG_CLASSIFICATION -> REPORT_SUB_CATEGORY

      expected: "Derived sub-category must match aggregated table"
      severity: "HIGH"

    - rule_id: "R5_AGGREGATION_QUANTITY"
      description: >
        Validate net holdings quantity calculation.

      formula: >
        Net Quantity = SUM(LONG quantities) - SUM(SHORT quantities)

      inputs:
        - LONG_SHORT_INDICATOR
        - HOLDINGS_QUANTITY

      expected: "Calculated value must match aggregated HOLDINGS_QUANTITY"
      severity: "CRITICAL"

    - rule_id: "R6_GROUPING_VALIDATION"
      description: >
        Validate aggregation grouping consistency.

      grouping_fields:
        - LEI
        - PARENT_ENTITY
        - MONITOR_ID
        - AGGREGATION_LEVEL

      expected: >
        Records must be uniquely grouped and no duplicate aggregation keys should exist.
      severity: "HIGH"

  execution_flow:

    - step: "Fetch aggregated records"
      query: >
        SELECT * FROM lhone_aggr_pos
        WHERE MONITOR_ID = 1
        AND AGGREGATION_LEVEL = 4

    - step: "Loop through each aggregated record"

    - step: "Extract LEI"

    - step: "Fetch matching stage records"

    - step: "Apply validation rules R1 to R6"

    - step: "Compute expected aggregation"

    - step: "Compare expected vs actual"

  edge_cases:

    - "LEI not present in stage table"
    - "Parent entity mismatch"
    - "Invalid report category mapping"
    - "Missing product mapping"
    - "All SHORT or all LONG records"
    - "Null or empty values"
    - "Duplicate aggregation records"

  assertions:

    - type: "EQUALITY"
      fields:
        - HOLDINGS_QUANTITY

    - type: "EXISTENCE"
      fields:
        - LEI

    - type: "MAPPING_VALIDATION"
      fields:
        - REPORT_CATEGORY
        - REPORT_SUB_CATEGORY

  logging:

    level: "INFO"
    include:
      - LEI
      - PARENT_ENTITY
      - EXPECTED_QUANTITY
      - ACTUAL_QUANTITY
      - VALIDATION_STATUS

  reporting:

    format: "Allure/Extent"
    include:
      - rule_id
      - status
      - expected
      - actual
      - error_message

  performance:

    recommendations:
      - "Use batch queries instead of row-by-row DB calls"
      - "Cache product map data"
      - "Use indexing on LEI and PRODUCT_TYPE columns"
      - "Parallel execution for large datasets"
