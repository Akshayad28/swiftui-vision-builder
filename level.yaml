aggregation_validation:
  metadata:
    project: "Database Automation Framework"
    module: "Aggregation Records Validation"
    level: "Level 4"
    version: "3.0"
    execution_type: "Database Driven"
    data_strategy: "All data fetched dynamically from DB (no external input)"

  objective:
    description: >
      Validate Level 4 aggregation records by deriving values from stage,
      eligibility, and reference tables and ensuring computed TOTAL_UL_QUANTITY
      matches HOLDING_QUANTITY.

  tables:
    aggregation_table: "lhone_aggr_pos"
    stage_table: "lhone_stage_pos_copy"
    eligibility_table: "lhone_europe_eligibility_pos"
    reference_tables:
      - "lhone_monitor_rpt_cat"
      - "lhone_monitor_rpt_sub_cat"
      - "lhone_product_map"

  preconditions:
    - AGGREGATION_LEVEL = 4
    - MONITOR_ID = 1
    - SECURITY_IDENTIFIER_KEY = "LEI"

  execution_flow:

    step_1_fetch_aggregation_record:
      query: |
        SELECT *
        FROM lhone_aggr_pos
        WHERE AGGREGATION_LEVEL = '4'
        AND MONITOR_ID = 1;
      store:
        LEI: SECURITY_IDENTIFIER_VALUE
        PARENT_ENTITY: PARENT_ENTITY
        REPORT_CATEGORY: REPORT_CATEGORY
        REPORT_SUB_CATEGORY: REPORT_SUB_CATEGORY
        HOLDING_QUANTITY: HOLDINGS_QUANTITY

    step_2_validate_lei:
      query: |
        SELECT *
        FROM lhone_stage_pos_copy
        WHERE LEI = '<LEI>';
      validation:
        condition: "records_count > 0"

    step_3_validate_parent_entity:
      query: |
        SELECT *
        FROM lhone_stage_pos_copy
        WHERE LEI = '<LEI>'
        AND SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>';
      validation:
        condition: "records_count > 0"

    step_4_eligibility_validation:
      description: >
        Validate eligibility using FILE_ID and LANDING_REC_ID from stage records.

      fetch_stage_keys:
        query: |
          SELECT FILE_ID, LANDING_REC_ID
          FROM lhone_stage_pos_copy
          WHERE LEI = '<LEI>'
          AND SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>';

      validate_eligibility:
        approach_1_iterative:
          query_template: |
            SELECT *
            FROM lhone_europe_eligibility_pos
            WHERE FILE_ID = '<FILE_ID>'
            AND LANDING_REC_ID = '<LANDING_REC_ID>';

        approach_2_join_based:
          query: |
            SELECT s.*, e.*
            FROM lhone_stage_pos_copy s
            JOIN lhone_europe_eligibility_pos e
              ON s.FILE_ID = e.FILE_ID
             AND s.LANDING_REC_ID = e.LANDING_REC_ID
            WHERE s.LEI = '<LEI>'
            AND s.SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>';

      validation:
        condition: "eligible records must exist"

    step_5_resolve_report_category:
      logic:

        case_non_exempt:
          condition: "REPORT_CATEGORY == 'Non-Exempt'"
          output: "Non-Exempt"

        case_derived:
          condition: "REPORT_CATEGORY != 'Non-Exempt'"
          steps:
            - fetch_classification:
                query: |
                  SELECT HOLDING_CLASSIFICATION
                  FROM lhone_stage_pos_copy
                  WHERE LEI = '<LEI>'
                  AND SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>';

            - validate_reference:
                query: |
                  SELECT *
                  FROM lhone_monitor_rpt_cat
                  WHERE REPORT_CATEGORY = '<HOLDING_CLASSIFICATION>';

          fallback:
            condition: "value not found in reference"
            output: "Non-Exempt"

          output: "HOLDING_CLASSIFICATION"

    step_6_validate_report_sub_category:

      reference_validation:
        query: |
          SELECT *
          FROM lhone_monitor_rpt_sub_cat
          WHERE SUB_REPORT_CATEGORY = '<REPORT_SUB_CATEGORY>';
        condition: "records_count > 0"

      product_mapping:
        query: |
          SELECT *
          FROM lhone_product_map
          WHERE UK_LONG_CLASSIFICATION = '<REPORT_SUB_CATEGORY>'
          AND UK_LONG_SCOPE = 'Y';

        extract_unique:
          PRODUCT_TYPE_LIST: "distinct PRODUCT_TYPE"
          PRODUCT_SUB_TYPE_LIST: "distinct PRODUCT_SUB_TYPE"
          SETTLEMENT_TYPE_LIST: "distinct SETTLEMENT_TYPE"

    step_7_fetch_filtered_stage_records:
      query: |
        SELECT *
        FROM lhone_stage_pos_copy
        WHERE LEI = '<LEI>'
        AND SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>'
        AND PRODUCT_TYPE IN (<PRODUCT_TYPE_LIST>)
        AND PRODUCT_SUB_TYPE IN (<PRODUCT_SUB_TYPE_LIST>)
        AND SETTLEMENT_TYPE IN (<SETTLEMENT_TYPE_LIST>);

      validation:
        condition: "records_count > 0"

    step_8_compute_total_ul_quantity:

      description: >
        Compute TOTAL_UL_QUANTITY using DELTA_UL_QUANTITY with conditional
        logic based on LONG_SHORT_INDICATOR and REPORT_SUB_CATEGORY.

      initialization:
        TOTAL_UL_QUANTITY: 0

      computation_rules:

        primary_rule: |

          IF (LONG_SHORT_INDICATOR = 'S' AND REPORT_SUB_CATEGORY = 'Shares')
          THEN
              TOTAL_UL_QUANTITY = TOTAL_UL_QUANTITY - DELTA_UL_QUANTITY
          ELSE
              TOTAL_UL_QUANTITY = TOTAL_UL_QUANTITY + DELTA_UL_QUANTITY

        explanation: >
          Subtraction is ONLY applied when:
          - LONG_SHORT_INDICATOR = 'S'
          AND
          - REPORT_SUB_CATEGORY = 'Shares'

          For all other cases → ADDITION

      iteration:

        for_each_record:
          input_fields:
            - LONG_SHORT_INDICATOR
            - DELTA_UL_QUANTITY

          operations:

            case_subtraction:
              condition: "LONG_SHORT_INDICATOR == 'S' AND REPORT_SUB_CATEGORY == 'Shares'"
              action: "TOTAL_UL_QUANTITY -= DELTA_UL_QUANTITY"

            case_addition:
              condition: "otherwise"
              action: "TOTAL_UL_QUANTITY += DELTA_UL_QUANTITY"

      post_processing:

        negative_handling:
          condition: "TOTAL_UL_QUANTITY <= 0"
          action: "TOTAL_UL_QUANTITY = 0"

      example:

        records:
          - { indicator: "L", quantity: 100, result: "0 + 100 = 100" }
          - { indicator: "L", quantity: 200, result: "100 + 200 = 300" }
          - { indicator: "S", quantity: 100, result: "300 - 100 = 200" }

        final_TOTAL_UL_QUANTITY: 200

    step_9_final_validation:

      validations:

        quantity_match:
          condition: "TOTAL_UL_QUANTITY == HOLDING_QUANTITY"
          type: "assertion"

      notes:
        - "REPORT_SUB_CATEGORY can be any value"
        - "Computation logic strictly depends on LONG_SHORT_INDICATOR + Shares condition"

  data_flow:
    context_storage:
      - LEI
      - PARENT_ENTITY
      - REPORT_CATEGORY
      - REPORT_SUB_CATEGORY
      - PRODUCT_TYPE_LIST
      - PRODUCT_SUB_TYPE_LIST
      - SETTLEMENT_TYPE_LIST
      - FILE_ID_LIST
      - LANDING_REC_ID_LIST
      - FILTERED_STAGE_RECORDS
      - TOTAL_UL_QUANTITY

  validation_types:
    - existence
    - mapping
    - referential
    - eligibility
    - derived
    - computational
    - consistency

  edge_cases:
    - "No eligible records found"
    - "Missing eligibility mapping"
    - "Invalid REPORT_CATEGORY fallback"
    - "Empty product mapping"
    - "No filtered stage records"
    - "TOTAL_UL_QUANTITY becomes negative"
    - "Mismatch with HOLDING_QUANTITY"

  logging:
    required:
      - "All executed queries"
      - "Eligibility validation results"
      - "Intermediate datasets"
      - "Step-wise computation logs"
      - "Final computed vs expected values"

  success_criteria:
    - "All validations pass"
    - "Eligibility confirmed"
    - "Computed TOTAL_UL_QUANTITY matches HOLDING_QUANTITY"

  failure_criteria:
    - "Eligibility failure"
    - "Missing mappings"
    - "Computation mismatch"
