test_plan:
  id: "TC_AGGR_L4_001"
  name: "Level 4 Aggregation Data Integrity Validation"
  domain: "Regulatory Reporting / Leading European Bank"
  description: "End-to-End database validation to ensure Level 4 aggregation records map correctly to staging and eligibility criteria, with accurate quantity and percentage calculations."
  
  global_parameters:
    RunID: "Dynamic (e.g., 1001)"
    JobID: "Dynamic (e.g., 5001)"
    BusinessDate: "YYYY-MM-DD"
    MonitorID: "Static per run (e.g., 1)"
    RecordLimit: 10

  prerequisites:
    - "Active JDBC connection to Preprod Database (lhone schema)."
    - "Data populated in lhone_aggr_pos, lhone_stage_pos_copy, and lhone_europe_eligibility_pos."
    - "Valid entries in monitor tables (lhone_monitor_rpt_cat, lhone_monitor_rpt_sub_cat, lhone_product_map)."

  execution_flow:
    - step: 1
      name: "Fetch Aggregation Records"
      action: "Query lhone_aggr_pos for given RunID and BusinessDate where AGGREGATION_LEVEL = 4."
      validation: "Ensure records are returned. Fail test scenario if empty."

    - step: 2
      name: "Validate Staging Eligibility"
      action: "INNER JOIN lhone_stage_pos_copy and lhone_europe_eligibility_pos using FILE_ID and LANDING_REC_ID."
      validation: "Record is Eligible ONLY IF matching stage records exist and map to the correct MonitorID, JobID, and Business Date."

    - step: 3
      name: "Report Category Validation"
      action: "Evaluate REPORT_CATEGORY from aggregation."
      validation: "Pass if 'Non-Exempt'. If else, validate holding classifications against lhone_monitor_rpt_cat. Default to Non-Exempt if no mapping is found."

    - step: 4
      name: "Sub-Category and Product Mapping"
      action: "Fetch product mapping rules for UK_LONG_SCOPE."
      validation: "Ensure eligible staging records match the mapped PRODUCT_TYPE, PRODUCT_SUB_TYPE, and SETTLEMENT_TYPE constraints."

    - step: 5
      name: "Total Underlying Quantity Calculation"
      action: "Sum DELTA_UL_QUANTITY based on LONG_SHORT_INDICATOR."
      business_rules: 
        - "Skip record entirely if ISSUER_VOTING_RIGHTS_OUTSTANDING is null or empty."
        - "If indicator is 'S' or 'SHORT', subtract delta."
        - "If indicator is 'L' or 'LONG', add delta."
        - "If calculated sum <= 0, default final value to 0.0."
      validation: "Calculated Quantity must equal HOLDINGS_QUANTITY from aggr table (tolerance: 0.0001)."

    - step: 6
      name: "Holding Percentage Calculation"
      action: "Calculate: (Calculated Quantity / ISSUER_VOTING_RIGHTS_OUTSTANDING) * 100."
      validation: "Calculated Percentage must match HOLDING_PERCENTAGE from aggregation table. Fails if Voting Rights <= 0."

  reporting:
    format: "Detailed Excel Spreadsheet (.xlsx)"
    failure_handling: "Soft assertions per record loop. Hard JUnit assertion at scenario conclusion if overall failure count > 0."
