aggregation_validation:
  metadata:
    project: "Database Automation Framework"
    module: "Aggregation Records Validation"
    level: "Level 4"
    execution_type: "Database Driven"
    data_strategy: "No external input - all data fetched dynamically from DB"
    version: "2.0"

  objective:
    description: >
      Validate Level 4 aggregation records by deriving values from stage and reference tables.
      Ensure computed aggregation quantity matches HOLDING_QUANTITY from aggregation table.

  tables:
    aggregation_table: "lhone_aggr_pos"
    stage_table: "lhone_stage_pos_copy"
    reference_tables:
      - "lhone_monitor_rpt_cat"
      - "lhone_monitor_rpt_sub_cat"
      - "lhone_product_map"

  preconditions:
    - AGGREGATION_LEVEL = 4
    - MONITOR_ID = 1
    - SECURITY_IDENTIFIER_KEY = "LEI"

  execution_flow:

    step_1_fetch_aggregation_record:
      query: |
        SELECT *
        FROM lhone_aggr_pos
        WHERE AGGREGATION_LEVEL = '4'
        AND MONITOR_ID = 1;
      store:
        LEI: SECURITY_IDENTIFIER_VALUE
        PARENT_ENTITY: PARENT_ENTITY
        REPORT_CATEGORY: REPORT_CATEGORY
        REPORT_SUB_CATEGORY: REPORT_SUB_CATEGORY
        HOLDING_QUANTITY: HOLDINGS_QUANTITY

    step_2_validate_lei:
      query: |
        SELECT *
        FROM lhone_stage_pos_copy
        WHERE LEI = '<LEI>';
      validation:
        type: "existence"
        condition: "records_count > 0"

    step_3_validate_parent_entity:
      query: |
        SELECT *
        FROM lhone_stage_pos_copy
        WHERE LEI = '<LEI>'
        AND SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>';
      validation:
        type: "mapping"
        condition: "records_count > 0"

    step_4_resolve_report_category:
      logic:

        case_non_exempt:
          condition: "REPORT_CATEGORY == 'Non-Exempt'"
          output: "Non-Exempt"

        case_derived:
          condition: "REPORT_CATEGORY != 'Non-Exempt'"
          steps:
            - fetch_stage_classification:
                query: |
                  SELECT HOLDING_CLASSIFICATION
                  FROM lhone_stage_pos_copy
                  WHERE LEI = '<LEI>'
                  AND SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>';

            - validate_reference:
                query: |
                  SELECT *
                  FROM lhone_monitor_rpt_cat
                  WHERE REPORT_CATEGORY = '<HOLDING_CLASSIFICATION>';

          output: "HOLDING_CLASSIFICATION"

      validation:
        type: "referential"
        condition: "value exists in reference table"

    step_5_validate_report_sub_category:

      sub_category_reference_check:
        query: |
          SELECT *
          FROM lhone_monitor_rpt_sub_cat
          WHERE SUB_REPORT_CATEGORY = '<REPORT_SUB_CATEGORY>';
        validation:
          condition: "records_count > 0"

      product_mapping:
        query: |
          SELECT *
          FROM lhone_product_map
          WHERE UK_LONG_CLASSIFICATION = '<REPORT_SUB_CATEGORY>'
          AND UK_LONG_SCOPE = 'Y';

        extract_unique:
          PRODUCT_TYPE_LIST: "distinct PRODUCT_TYPE"
          PRODUCT_SUB_TYPE_LIST: "distinct PRODUCT_SUB_TYPE"
          SETTLEMENT_TYPE_LIST: "distinct SETTLEMENT_TYPE"

    step_6_fetch_filtered_stage_records:
      query: |
        SELECT *
        FROM lhone_stage_pos_copy
        WHERE LEI = '<LEI>'
        AND SDS_ENTITY_FIRST_L = '<PARENT_ENTITY>'
        AND PRODUCT_TYPE IN (<PRODUCT_TYPE_LIST>)
        AND PRODUCT_SUB_TYPE IN (<PRODUCT_SUB_TYPE_LIST>)
        AND SETTLEMENT_TYPE IN (<SETTLEMENT_TYPE_LIST>);

      validation:
        condition: "records_count > 0"

    step_7_compute_total_ul_quantity:

      description: >
        Compute TOTAL_UL_QUANTITY using LONG_SHORT_INDICATOR and DELTA_UL_QUANTITY.
        This logic is independent of REPORT_CATEGORY value.

      initialization:
        TOTAL_UL_QUANTITY: 0

      iteration_logic:

        rule_definition: |

          IF LONG_SHORT_INDICATOR = 'S'
          THEN
              TOTAL_UL_QUANTITY = TOTAL_UL_QUANTITY - DELTA_UL_QUANTITY
          ELSE
              TOTAL_UL_QUANTITY = TOTAL_UL_QUANTITY + DELTA_UL_QUANTITY

      processing_steps:

        - for_each_record: "Filtered Stage Records"

        - step:
            input_fields:
              - LONG_SHORT_INDICATOR
              - DELTA_UL_QUANTITY

            operations:

              case_long:
                condition: "LONG_SHORT_INDICATOR == 'L'"
                action: "TOTAL_UL_QUANTITY += DELTA_UL_QUANTITY"

              case_short:
                condition: "LONG_SHORT_INDICATOR == 'S'"
                action: "TOTAL_UL_QUANTITY -= DELTA_UL_QUANTITY"

      post_processing:

        negative_handling:
          condition: "TOTAL_UL_QUANTITY <= 0"
          action: "TOTAL_UL_QUANTITY = 0"

      example_execution:

        records:
          - record_1:
              LONG_SHORT_INDICATOR: "L"
              DELTA_UL_QUANTITY: 100
              result: "0 + 100 = 100"

          - record_2:
              LONG_SHORT_INDICATOR: "L"
              DELTA_UL_QUANTITY: 200
              result: "100 + 200 = 300"

          - record_3:
              LONG_SHORT_INDICATOR: "S"
              DELTA_UL_QUANTITY: 100
              result: "300 - 100 = 200"

        final_result: 200

    step_8_final_validation:

      description: >
        Validate computed TOTAL_UL_QUANTITY against HOLDING_QUANTITY from aggregation table.

      validations:

        quantity_match:
          condition: "TOTAL_UL_QUANTITY == HOLDING_QUANTITY"
          type: "assertion"

        rule_note:
          description: >
            REPORT_CATEGORY value (e.g., Shares or any other category)
            does NOT impact the computation logic of TOTAL_UL_QUANTITY.
            LONG_SHORT_INDICATOR logic remains consistent across all categories.

  data_flow:
    context_storage:
      - LEI
      - PARENT_ENTITY
      - REPORT_CATEGORY
      - REPORT_SUB_CATEGORY
      - PRODUCT_TYPE_LIST
      - PRODUCT_SUB_TYPE_LIST
      - SETTLEMENT_TYPE_LIST
      - FILTERED_STAGE_RECORDS
      - TOTAL_UL_QUANTITY

  validation_types:
    - existence
    - mapping
    - referential
    - derived
    - computational
    - consistency

  edge_cases:
    - "No stage records found"
    - "Mixed LONG_SHORT_INDICATOR values"
    - "TOTAL_UL_QUANTITY becomes negative"
    - "Mismatch with HOLDING_QUANTITY"
    - "Invalid REPORT_CATEGORY reference"
    - "Missing product mapping"

  logging:
    required:
      - "Executed queries"
      - "Input parameters"
      - "Intermediate datasets"
      - "Computation steps"
      - "Final computed value vs expected"

  success_criteria:
    - "All validations pass"
    - "Computed quantity matches aggregation value"

  failure_criteria:
    - "Mismatch in quantity"
    - "Missing reference data"
    - "Incorrect mapping"
